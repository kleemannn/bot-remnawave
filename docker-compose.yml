services:
  postgres:
    image: postgres:16-alpine
    container_name: remna_bot_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: remna_user
      POSTGRES_PASSWORD: remna_pass
      POSTGRES_DB: remna_bot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U remna_user -d remna_bot"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - bot-network

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: remna_dealer_bot
    restart: unless-stopped
    init: true
    stop_grace_period: 20s
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:3011:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health/ready >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - bot-network
      - remnawave-network

  webapp:
    build:
      context: ./webapp
      dockerfile: Dockerfile
    container_name: remna_dealer_webapp
    restart: unless-stopped
    init: true
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000 >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - bot-network

  nginx:
    image: nginx:1.27-alpine
    container_name: remna_dealer_gateway
    restart: unless-stopped
    depends_on:
      bot:
        condition: service_healthy
      webapp:
        condition: service_started
    ports:
      - "127.0.0.1:3010:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - bot-network

volumes:
  postgres_data:

networks:
  bot-network:
    driver: bridge
  remnawave-network:
    external: true
